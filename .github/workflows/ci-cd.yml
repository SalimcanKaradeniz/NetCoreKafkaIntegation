name: KafkaDemo CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '10.0.x'
  PRODUCER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kafkademo-producer
  CONSUMER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kafkademo-consumer

jobs:

  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: .NET kurulumu
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore KafkaDemo.slnx

      - name: Build
        run: dotnet build KafkaDemo.slnx --no-restore -c Release

      - name: Test
        run: dotnet test KafkaDemo.slnx --no-build -c Release --verbosity normal

  cd:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata - Producer
        id: metadata-producer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PRODUCER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Image metadata - Consumer
        id: metadata-consumer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONSUMER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Producer - Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: KafkaDemo.Producer/Dockerfile
          push: true
          tags: ${{ steps.metadata-producer.outputs.tags }}

      - name: Consumer - Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: KafkaDemo.Consumer/Dockerfile
          push: true
          tags: ${{ steps.metadata-consumer.outputs.tags }}

      - name: Özet
        run: |
          echo "## Deploy Özeti" >> $GITHUB_STEP_SUMMARY
          echo "Producer: ${{ env.PRODUCER_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "Consumer: ${{ env.CONSUMER_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY